<script>
  // 关键修复：等待DOM加载完成再执行脚本
  document.addEventListener('DOMContentLoaded', function() {
    // 创建自定义光标
    const cursor = document.createElement('div');
    cursor.className = 'fairy-cursor';
    document.body.appendChild(cursor);

    // 鼠标移动跟随 + 生成粒子
    document.addEventListener('mousemove', function(e) {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      if (Math.random() > 0.1) return; // 提高粒子生成频率，更容易看到效果
      createFairyParticle(e.clientX, e.clientY);
    });

    // 鼠标点击效果
    document.addEventListener('mousedown', function() {
      cursor.classList.add('click');
      for (let i = 0; i < 10; i++) {
        createFairyParticle(cursor.offsetLeft, cursor.offsetTop);
      }
    });
    document.addEventListener('mouseup', function() {
      cursor.classList.remove('click');
    });

    // 生成粒子函数
    function createFairyParticle(x, y) {
      const particle = document.createElement('div');
      particle.className = 'fairy-particle';
      document.body.appendChild(particle);

      const colors = ['#ff69b4', '#ff8c00', '#ffff00', '#00ff99', '#00ffff', '#9900ff'];
      const color = colors[Math.floor(Math.random() * colors.length)];
      const size = Math.random() * 8 + 2;
      const speedX = Math.random() * 6 - 3;
      const speedY = Math.random() * 6 - 3;
      const opacity = Math.random() * 0.8 + 0.2;
      const lifetime = Math.random() * 80 + 40;

      particle.style.left = x - size/2 + 'px';
      particle.style.top = y - size/2 + 'px';
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.background = color;
      particle.style.opacity = opacity;

      let frame = 0;
      function animateParticle() {
        frame++;
        if (frame > lifetime) {
          particle.remove();
          return;
        }
        const currentX = parseFloat(particle.style.left) + speedX;
        const currentY = parseFloat(particle.style.top) + speedY;
        const currentOpacity = opacity * (1 - frame / lifetime);
        particle.style.left = currentX + 'px';
        particle.style.top = currentY + 'px';
        particle.style.opacity = currentOpacity;
        requestAnimationFrame(animateParticle);
      }
      animateParticle();
    }

    // 清理资源
    window.addEventListener('beforeunload', function() {
      cursor.remove();
      document.querySelectorAll('.fairy-particle').forEach(p => p.remove());
    });
  });
</script>
